services:
  # ── Backend (Node.js / Express) ───────────────────────────────────────────
  - type: web
    name: bts-supply-chain-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # Set to your frontend Render URL after it is deployed
    healthCheckPath: /api/health

  # ── Frontend (React / Vite — Static Site) ────────────────────────────────
  - type: web
    name: bts-supply-chain-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://bts-supply-chain.onrender.com/api
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
